{% extends "accounts/auth_base.html" %}
{% block title %}Login - VolleyPilot{% endblock %}
{% block auth_content %}
<h2 style="font-size: 24px; font-weight: 700; margin-bottom: 24px; color: #1e293b;">Sign In</h2>
<form method="post">
    {% csrf_token %}
    <div class="form-group">
        <label for="id_username">Email</label>
        <input type="email" name="username" id="id_username" required autofocus>
    </div>
    <div class="form-group">
        <label for="id_password">Password</label>
        <input type="password" name="password" id="id_password" required>
    </div>
    {% if form.errors %}
    <div style="color: #991b1b; font-size: 14px; margin-bottom: 16px;">
        Invalid email or password.
    </div>
    {% endif %}
    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">Sign In</button>
</form>
<div style="text-align: center; margin-top: 20px; font-size: 14px; color: #64748b;">
    <a href="{% url 'password_reset' %}" style="color: #3b82f6; text-decoration: none;">Forgot password?</a>
</div>
<div style="text-align: center; margin-top: 12px; font-size: 14px; color: #64748b;">
    Don't have an account? <a href="{% url 'register' %}" style="color: #3b82f6; text-decoration: none;">Register</a>
</div>
{% endblock %}
