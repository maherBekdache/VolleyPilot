{% extends 'base.html' %}
{% block title %}Post Announcement — VolleyPilot{% endblock %}

{% block content %}
<div style="max-width: 640px; margin: 0 auto;">
    <div style="margin-bottom: 24px;">
        <h2 style="margin:0 0 4px;">Post Team Announcement</h2>
        <p style="color:#94a3b8; font-size:14px; margin:0;">Sent to all members of {{ team.name }}.</p>
    </div>

    <form method="post" style="background:#1e293b; border-radius:10px; padding:24px;">
        {% csrf_token %}

        <div class="form-group" style="margin-bottom:20px;">
            <label style="display:block; color:#94a3b8; font-size:13px; font-weight:600; margin-bottom:6px; text-transform:uppercase; letter-spacing:.5px;">
                Title
            </label>
            <input type="text" name="title" required maxlength="200"
                   value="{{ request.POST.title|default:'' }}"
                   style="width:100%; padding:10px 12px; background:#0f172a; border:1px solid #334155;
                          border-radius:8px; color:#f1f5f9; font-size:14px; box-sizing:border-box;">
        </div>

        <div class="form-group" style="margin-bottom:20px;">
            <label style="display:block; color:#94a3b8; font-size:13px; font-weight:600; margin-bottom:6px; text-transform:uppercase; letter-spacing:.5px;">
                Message
            </label>
            <textarea name="body" required rows="5"
                      style="width:100%; padding:10px 12px; background:#0f172a; border:1px solid #334155;
                             border-radius:8px; color:#f1f5f9; font-size:14px; resize:vertical; box-sizing:border-box;">{{ request.POST.body|default:'' }}</textarea>
        </div>

        <div style="display:flex; gap:12px; justify-content:flex-end;">
            <a href="{% url 'dashboard' %}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">Send Announcement</button>
        </div>
    </form>
</div>
{% endblock %}
