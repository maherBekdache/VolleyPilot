{% extends "accounts/auth_base.html" %}
{% block title %}Reset Password - VolleyPilot{% endblock %}
{% block auth_content %}
<h2 style="font-size: 24px; font-weight: 700; margin-bottom: 8px; color: #1e293b;">Reset Password</h2>
<p style="color: #64748b; font-size: 14px; margin-bottom: 24px;">Enter your email and we'll send you a reset link.</p>
<form method="post">
    {% csrf_token %}
    <div class="form-group">
        <label for="id_email">Email</label>
        <input type="email" name="email" id="id_email" required autofocus>
    </div>
    <button type="submit" class="btn btn-primary" style="width: 100%;">Send Reset Link</button>
</form>
<div style="text-align: center; margin-top: 20px; font-size: 14px;">
    <a href="{% url 'login' %}" style="color: #3b82f6; text-decoration: none;">Back to login</a>
</div>
{% endblock %}
